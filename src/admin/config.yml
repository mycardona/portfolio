backend:
  name: github
  repo: mycardona/portfolio
  branch: main
  # Netlify site used only for OAuth provider tokens
  site_domain: scintillating-pegasus-27bdcb.netlify.app
  # Limit OAuth scope for public-repo editing
  auth_scope: public_repo

# Allows local CMS editing via `npm run dev:cms`
local_backend: true

# Set this to your live public site URL (GitHub Pages in this setup)
site_url: https://mycardona.github.io/portfolio/
media_folder: src/uploads
public_folder: /uploads

collections:
  - name: categories
    label: Categories
    label_singular: Category
    folder: src/content/categories
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    identifier_field: title
    fields:
      - {
          label: Category Title,
          name: title,
          widget: string,
          hint: "Display name shown across the site."
        }
      - {
          label: Slug,
          name: slug,
          widget: string,
          hint: "Lowercase URL key, e.g. 'performance'."
        }
      - {
          label: Description,
          name: description,
          widget: text,
          required: false,
          hint: "Short category intro shown on category pages."
        }
      - {
          label: Order,
          name: order,
          widget: number,
          value_type: int,
          required: false,
          min: 1,
          hint: "Optional sort order for category lists. Lower numbers appear first."
        }
      - { label: Permalink, name: permalink, widget: hidden, default: false }
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Date
        name: date
        widget: datetime
        time_format: false
        date_format: "MMMM YYYY"
        format: "YYYY-MM"
        picker_utc: true
        hint: "Month and year only."
      - label: Categories
        name: categories
        widget: relation
        collection: categories
        search_fields: ["title"]
        value_field: slug
        display_fields: ["title"]
        required: false
        multiple: true
        hint: "Select from existing categories in the Categories collection."
      - { label: Summary, name: summary, widget: text, required: false }
      - {
          label: Venue,
          name: venueName,
          widget: string,
          required: false,
          hint: "Venue name, e.g. New Conservatory Theater Company."
        }
      - {
          label: Venue URL,
          name: venueUrl,
          widget: string,
          required: false,
          hint: "Optional link to the venue website."
        }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - label: Gallery Images
        name: gallery
        widget: bulkGithubImages
        required: false
        repo: mycardona/portfolio
        branch: main
        proxy_url: http://localhost:8081/api/v1
        media_folder: src/uploads
        public_folder: /uploads
      - label: Video or Audio URL
        name: mediaUrl
        widget: string
        required: false
        hint: "Use https://... for an external media URL or /uploads/... for a direct uploaded media file."
        pattern:
          - "^(https?:\\/\\/\\S+|\\/\\S+)$"
          - "Use a full https:// URL or a site-relative file path like /uploads/reel.mp4"
      - { label: Body, name: body, widget: markdown }
  - name: videos
    label: Videos
    label_singular: Video
    folder: src/content/videos
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - {
          label: Reel Tag,
          name: reelTag,
          widget: string,
          hint: "Used for the homepage reel tab label, for example Dramatic or Comedic."
        }
      - label: Video URL
        name: mediaUrl
        widget: string
        hint: "Use https://... for an external media URL or /uploads/... for a direct uploaded media file."
        pattern:
          - "^(https?:\\/\\/\\S+|\\/\\S+)$"
          - "Use a full https:// URL or a site-relative file path like /uploads/reel.mp4"
  - name: pressQuotes
    label: Press + Testimonials
    label_singular: Quote
    folder: src/content/press
    create: true
    slug: "{{slug}}"
    summary: "{{source}}"
    fields:
      - {
          label: Order,
          name: order,
          widget: number,
          value_type: int,
          required: false,
          min: 1,
          hint: "Optional sort order. Lower numbers appear first."
        }
      - {
          label: Quote,
          name: quote,
          widget: text,
          hint: "The testimonial or press quote shown on the homepage."
        }
      - {
          label: Source,
          name: source,
          widget: string,
          required: false,
          hint: "Who or where the quote is from."
        }
      - {
          label: Source Link,
          name: sourceUrl,
          widget: string,
          required: false,
          hint: "Optional URL to the article or source."
        }
  - name: about
    label: About
    files:
      - label: Hero
        name: hero
        file: src/_data/about/hero.json
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string, required: false }
          - { label: Title, name: title, widget: string, required: false }
          - { label: Lead, name: lead, widget: text, required: false }
      - label: Detail
        name: detail
        file: src/_data/about/detail.json
        fields:
          - label: Sections
            name: sections
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string, required: false }
              - label: Paragraphs
                name: paragraphs
                widget: list
                field:
                  label: Paragraph
                  name: paragraph
                  widget: text
      - label: Resume
        name: resume
        file: src/_data/about/resume.json
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string, required: false }
          - { label: Title, name: title, widget: string, required: false }
          - { label: Name, name: name, widget: string, required: false }
          - { label: Tagline, name: tagline, widget: string, required: false }
          - { label: Contact Button Label, name: contactTitle, widget: string, required: false }
          - { label: Contact Note, name: contactNote, widget: string, required: false }
          - {
              label: Contact URL,
              name: contactUrl,
              widget: string,
              required: false,
              hint: "Use a page path or full https:// URL."
            }
          - label: Main Column
            name: main
            widget: object
            fields:
              - { label: Stage Heading, name: stageHeading, widget: string, required: false }
              - label: Stage Credits
                name: stageCredits
                widget: list
                summary: "{{fields.role}}"
                fields:
                  - { label: Role, name: role, widget: string, required: false }
                  - { label: Show Title, name: showTitle, widget: string, required: false }
                  - { label: Director, name: director, widget: string, required: false }
                  - { label: Details, name: details, widget: string, required: false }
              - { label: Film Heading, name: filmHeading, widget: string, required: false }
              - label: Film Credits
                name: filmCredits
                widget: list
                summary: "{{fields.role}}"
                fields:
                  - { label: Role, name: role, widget: string, required: false }
                  - { label: Show Title, name: showTitle, widget: string, required: false }
                  - { label: Director, name: director, widget: string, required: false }
                  - { label: Details, name: details, widget: string, required: false }
              - { label: Recognition Heading, name: recognitionHeading, widget: string, required: false }
              - label: Recognition Items
                name: recognitionItems
                widget: list
                summary: "{{fields.text}}"
                fields:
                  - { label: Date, name: date, widget: string, required: false }
                  - { label: Text, name: text, widget: string, required: false }
          - label: Side Column
            name: side
            widget: object
            fields:
              - { label: Works Heading, name: worksHeading, widget: string, required: false }
              - label: Works Items
                name: worksItems
                widget: list
                summary: "{{fields.role}}"
                fields:
                  - { label: Date, name: date, widget: string, required: false }
                  - { label: Role, name: role, widget: string, required: false }
                  - { label: Highlight, name: highlight, widget: string, required: false }
                  - { label: Details, name: details, widget: string, required: false }
              - { label: Skills Heading, name: skillsHeading, widget: string, required: false }
              - label: Skills
                name: skills
                widget: list
                field:
                  label: Skill
                  name: skill
                  widget: string
              - { label: Training Heading, name: trainingHeading, widget: string, required: false }
              - label: Training Items
                name: trainingItems
                widget: list
                summary: "{{fields.text}}"
                fields:
                  - { label: Date, name: date, widget: string, required: false }
                  - { label: Text, name: text, widget: string, required: false }
  - name: footer
    label: Footer
    files:
      - label: Footer
        name: footer
        file: src/_data/footer.json
        fields:
          - label: Connect Methods
            name: connect
            widget: list
            summary: "{{fields.type}}"
            fields:
              - label: Type
                name: type
                widget: select
                options:
                  - { label: Booking Inquiries, value: booking }
                  - { label: Email, value: email }
                  - { label: Instagram, value: instagram }
                  - { label: LinkedIn, value: linkedin }
                  - { label: YouTube, value: youtube }
                  - { label: X, value: x }
                hint: "Determines the default label and icon."
              - label: Link
                name: link
                widget: string
                hint: "Use a page path, a mailto: link, or a full https:// URL."
              - label: SVG Override
                name: svg
                widget: image
                required: false
                hint: "Optional SVG upload. Leave empty to use the built-in icon for the selected type."
              - label: Order
                name: order
                widget: number
                value_type: int
                required: false
                min: 1
                hint: "Lower numbers appear first."
