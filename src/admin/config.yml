backend:
  name: github
  repo: mylocardona/portfolio
  branch: main
  # Netlify site used only for OAuth provider tokens
  site_domain: YOUR-NETLIFY-SITE.netlify.app

# Allows local CMS editing via `npm run dev:cms`
local_backend: true

# Set this to your live public site URL (GitHub Pages in this setup)
site_url: https://mylocardona.github.io/portfolio/
media_folder: src/uploads
public_folder: /uploads

collections:
  - name: categories
    label: Categories
    label_singular: Category
    folder: src/content/categories
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    identifier_field: title
    fields:
      - {
          label: Category Title,
          name: title,
          widget: string,
          hint: "Display name shown across the site."
        }
      - {
          label: Slug,
          name: slug,
          widget: string,
          hint: "Lowercase URL key, e.g. 'performance-work'."
        }
      - { label: Permalink, name: permalink, widget: hidden, default: false }
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - label: Categories
        name: categories
        widget: relation
        collection: categories
        search_fields: ["title"]
        value_field: slug
        display_fields: ["title"]
        required: false
        multiple: true
        hint: "Select from existing categories in the Categories collection."
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - label: Gallery Images
        name: gallery
        widget: list
        required: false
        fields:
          - label: Image
            name: image
            widget: image
            choose_url: false
            allow_multiple: true
            media_library:
              config:
                multiple: true
      - {
          label: Video or Audio URL,
          name: mediaUrl,
          widget: string,
          required: false,
          hint: "Paste a YouTube, Vimeo, or SoundCloud URL"
        }
      - { label: Body, name: body, widget: markdown }
