backend:
  name: git-gateway
  branch: main

# Allows local CMS editing via `npm run dev:cms`
local_backend: true

# Set this to your Netlify production URL once deployed
site_url: https://YOUR-NETLIFY-SITE.netlify.app
media_folder: src/uploads
public_folder: /uploads

collections:
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - label: Categories
        name: categories
        widget: select
        required: false
        multiple: true
        create: true
        options:
          - { label: Original Work, value: original work }
          - { label: Performance Work, value: performance work }
          - { label: Facilitation Work, value: facilitation work }
          - { label: Directorship Work, value: directorship work }
        hint: "Start with defaults or type a new category to add more."
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - label: Gallery Images
        name: gallery
        widget: list
        required: false
        fields:
          - { label: Image, name: image, widget: image }
      - {
          label: Video or Audio URL,
          name: mediaUrl,
          widget: string,
          required: false,
          hint: "Paste a YouTube, Vimeo, or SoundCloud URL"
        }
      - { label: Body, name: body, widget: markdown }
